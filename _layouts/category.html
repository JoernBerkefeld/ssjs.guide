---
layout: default
---

<main class="page-content category-page" aria-label="Category index">
  <div class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.description %}
      <p class="page-description">{{ page.description }}</p>
    {% endif %}
  </div>

  <div class="page-body prose">
    {{ content }}
  </div>
</main>
